services:
  searxng-core:
    image: docker.io/searxng/searxng:2026.4.28-ed5955a5c # https://hub.docker.com/r/searxng/searxng/tags
    container_name: searxng-core
    restart: always
    networks:
      - searxng
    env_file:
      - config.env
    volumes:
      - ${DATA_PATH}/searxng/configs:/etc/searxng
      - ${DATA_PATH}/searxng/volumes/librechat/data:/var/cache/searxng
    depends_on:
      - searxng-valkey

  searxng-valkey:
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:9.0.3 # https://hub.docker.com/r/valkey/valkey
    volumes:
      - ${DATA_PATH}/searxng/volumes/valkey:/data
    restart: always
    command: valkey-server --save 30 1 --loglevel warning
    networks:
      - searxng

networks:
  searxng:
    external: true