services:
  caddy:
    build:
      context: ${DATA_PATH}/caddy/docker
    container_name: caddy
    restart: always
    ports:
      - 443:443
    networks:
      - anythingllm
      - caddy
      - forgejo
      - homeassistant
      - immich
      - radicale
      - searxng
      - supernote
      - syncthing
      - vaultwarden
    volumes:
      - ${DATA_PATH}/caddy/configs/Caddyfile:/etc/caddy/Caddyfile:Z
      - ${DATA_PATH}/caddy/volumes/caddy:/data/caddy:Z
      - ${DATA_PATH}/caddy/volumes/bookmarks:/data/bookmarks:Z

networks:
  anythingllm:
    external: true
  caddy:
    external: true
  forgejo:
    external: true
  homeassistant:
    external: true
  immich:
    external: true
  radicale:
    external: true
  searxng:
    external: true
  supernote:
    external: true
  syncthing:
    external: true
  vaultwarden:
    external: true