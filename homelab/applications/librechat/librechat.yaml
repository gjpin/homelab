# https://github.com/danny-avila/LibreChat/blob/v0.8.5/librechat.example.yaml

version: 1.3.9

cache: true

# https://www.librechat.ai/docs/configuration/librechat_yaml/object_structure/interface
interface:
  customWelcome: "Welcome to LibreChat! Enjoy your experience."
  fileSearch: true
  privacyPolicy:
    externalUrl: "https://librechat.ai/privacy-policy"
    openNewTab: true
  termsOfService:
    externalUrl: "https://librechat.ai/tos"
    openNewTab: true
    modalAcceptance: false
  modelSelect: true
  parameters: true
  presets: true
  prompts:
    use: true
    create: true
    share: false
    public: false
  bookmarks: true
  multiConvo: true
  agents:
    use: true
    create: true
    share: false
    public: false
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: false
  fileCitations: true

# https://www.librechat.ai/docs/configuration/librechat_yaml/object_structure/registration
registration:
  socialLogins: []

# https://www.librechat.ai/docs/configuration/librechat_yaml/ai_endpoints
endpoints:
  custom:
    # Deepseek
    - name: "Deepseek"
      apiKey: "${LIBRECHAT_DEEPSEEK_API_KEY}"
      baseURL: "https://api.deepseek.com/v1"
      models:
        default: ["deepseek-v4-pro", "deepseek-v4-flash"]
        fetch: false
      titleConvo: true
      titleModel: "deepseek-v4-pro"
      modelDisplayLabel: "Deepseek"
    # OpenRouter
    - name: "OpenRouter"
      apiKey: "${LIBRECHAT_OPENROUTER_API_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["deepseek/deepseek-v4-pro", "moonshotai/kimi-k2.6", "z-ai/glm-5.1"]
        fetch: true
      titleConvo: true
      titleModel: "deepseek/deepseek-v4-pro"
      dropParams: ["stop"]
      modelDisplayLabel: "OpenRouter"

# https://www.librechat.ai/docs/configuration/librechat_yaml/object_structure/web_search
# https://www.librechat.ai/docs/features/web_search
webSearch:
  searchProvider: "searxng"
  # Reranker
  jinaApiKey: "${LIBRECHAT_JINA_API_KEY}"
  jinaApiUrl: "https://api.jina.ai/v1/rerank"
  # Search provider
  searxngInstanceUrl: "http://searxng-core"
  searxngApiKey: ""
  # Scraper
  firecrawlApiKey: "${LIBRECHAT_FIRECRAWL_API_KEY}"
  firecrawlApiUrl: "http://firecrawl-api"

# https://www.librechat.ai/docs/configuration/librechat_yaml/object_structure/memory
# https://www.librechat.ai/docs/features/memory
memory:
  disabled: false
  personalize: true
  tokenLimit: 2000
  messageWindowSize: 10
  agent:
    provider: "OpenRouter"
    model: "deepseek/deepseek-v4-flash"